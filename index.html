<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCESS_PROTOCOL | 社交工程数据库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        .scanline { width: 100%; height: 2px; background: rgba(0, 255, 0, 0.1); position: absolute; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        .crt-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05)); background-size: 100% 2px, 3px 100%; pointer-events: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="scanline"></div>
    <div class="crt-overlay"></div>

    <div class="relative z-10 w-full max-w-md p-8 border border-green-900 bg-black/90 shadow-[0_0_20px_rgba(0,255,0,0.2)]">
        <header class="mb-8 border-b border-green-900 pb-4">
            <h1 class="text-xl font-bold tracking-[0.2em] uppercase">Status: Restricted</h1>
            <p class="text-[10px] opacity-50 mt-1">Authorized Personnel Only // Node_ID: SG-2026</p>
        </header>

        <div class="flex flex-col items-center mb-8">
            <div class="p-3 border border-green-500/50 bg-green-500/5 mb-4">
                <img src="http://mmbiz.qpic.cn/sz_mmbiz_jpg/1Vd0DvJG7yQHLObzdDnM8csKPZRqIulZf6CqZ9GqSjiaTMYDdoDkxugJz1tliaAYpBL6ib5gG3cUMDPGar1UnrwrksUX9vuf2tuNtKX6kOnp9k/0" alt="QR_TOKEN" class="w-44 h-44 brightness-75 contrast-125">
            </div>
            <p class="text-[10px] animate-pulse italic">请扫描上方量子令牌以接收接入密钥...</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] uppercase block mb-2 opacity-70">Access Token:</label>
                <input type="text" id="tokenInput" maxlength="4" placeholder="0000"
                    class="w-full bg-black border border-green-500/50 py-3 text-center text-3xl tracking-[0.8em] focus:outline-none focus:border-green-400 transition-all text-green-400">
            </div>

            <button onclick="executeLogin()" 
                class="w-full bg-green-900/30 border border-green-500 py-3 text-sm font-bold hover:bg-green-500 hover:text-black transition-all duration-300">
                EXECUTE_DECRYPTION
            </button>
        </div>

        <footer class="mt-8 pt-4 border-t border-green-900 text-[9px] opacity-40">
            <div class="flex justify-between">
                <span>ENCRYPTION: AES-256</span>
                <span>DB_v4.2.0</span>
            </div>
        </footer>
    </div>

    <script>
        function executeLogin() {
            const val = document.getElementById('tokenInput').value;
            if(val.length === 4) {
                alert("密钥已提交至集群。正在执行深度解密...");
                // 在这里跳转到你的同学录主页
                // window.location.href = "main.html";
            } else {
                alert("CRITICAL ERROR: TOKEN_MISMATCH");
            }
        }
    </script>
</body>
</html>
